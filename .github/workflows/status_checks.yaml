name: CI
on:
    pull_request:
    push:
        branches: [main]

    workflow_dispatch:

jobs:
    code_style:
        name: Format Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
              with:
                  version: 11
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Format Check
              run: pnpm run format:check

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
              with:
                  version: 11
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Lint
              run: pnpm run lint

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
              with:
                  version: 11
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Build
              run: pnpm build
